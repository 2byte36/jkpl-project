services:
  db:
    image: mysql:8.0
    container_name: jkpl-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-jkpl}
      MYSQL_USER: ${DB_USERNAME:-jkpl}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Set DB_ROOT_PASSWORD in .env}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - jkpl-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jkpl-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-TicketBuzz API}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:5000}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-jkpl}
      DB_USERNAME: ${DB_USERNAME:-jkpl}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:5000/auth/callback}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-}
    ports:
      - "${BACKEND_PORT:-5000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - jkpl-net

  public-fe:
    build:
      context: ./public-fe
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:5000}
    container_name: jkpl-public-fe
    restart: unless-stopped
    ports:
      - "${PUBLIC_FE_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jkpl-net

  admin-fe:
    build:
      context: ./admin-fe
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${ADMIN_API_BASE_URL:-http://localhost:5000}
    container_name: jkpl-admin-fe
    restart: unless-stopped
    ports:
      - "${ADMIN_FE_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - jkpl-net

networks:
  jkpl-net:
    driver: bridge

volumes:
  mysql-data:
